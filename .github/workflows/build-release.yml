name: Build QuantClaw Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许你手动点按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest  # 用 Ubuntu 系统编译
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake git libssl-dev

      - name: 编译项目
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: 发布到 Release
        uses: softprops/action-gh-release@v1
        with:
          name: QuantClaw Build ${{ github.sha }}
          tag_name: build-${{ github.sha }}
          files: |
            build/quantclaw
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
